{% extends "student/base.html" %}

{% block content %}

<div class="main">

    <div class="card">

        <h2>Change Password</h2>

        {% if messages %}
            {% for message in messages %}
                <p class="success-msg">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Old Password</label>
                {{ form.old_password }}
            </div>

            <div class="form-group">
                <label>New Password</label>
                {{ form.new_password1 }}
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                {{ form.new_password2 }}
            </div>

            <button class="btn-primary" type="submit">
                Update Password
            </button>
        </form>

    </div>

</div>

<style>
.form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.form-group input {
    margin-top: 6px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    width: 100%;
    display: block;
    box-sizing: border-box;
}

.success-msg {
    color: #22c55e;
    margin-bottom: 10px;
}

/* DARK MODE SUPPORT */
body.dark .form-group input {
    background: #334155;
    color: white;
    border: none;
}
</style>

{% endblock %}
