<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>
        {% block title %}AttendX{% endblock %}
    </title>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --g1:#6c3eff;
            --g2:#e040fb;

            --grad:
                linear-gradient(
                    135deg,
                    var(--g1),
                    var(--g2)
                );

            --bg:#f4f7ff;

            --surface:#ffffff;

            --surface2:#eef2ff;

            --border:
                rgba(0,0,0,.07);

            --text:#0f172a;

            --muted:#64748b;

            --sidebar:260px;

            --mini:86px;

        }

        body.dark{

            --bg:#060816;

            --surface:#0f172a;

            --surface2:#172036;

            --border:
                rgba(255,255,255,.06);

            --text:#f8fafc;

            --muted:#94a3b8;

        }

        body{

            font-family:
                'Plus Jakarta Sans',
                sans-serif;

            background:var(--bg);

            color:var(--text);

            min-height:100vh;

            overflow-x:hidden;

            transition:.35s;

        }

        a{
            text-decoration:none;
            color:inherit;
        }

        /* SIDEBAR */

        .sidebar{

            position:fixed;

            top:0;
            left:0;

            width:var(--sidebar);

            height:100vh;

            background:var(--surface);

            border-right:
                1px solid var(--border);

            display:flex;

            flex-direction:column;

            overflow:hidden;

            transition:.35s;

            z-index:999;

        }

        body.mini .sidebar{
            width:var(--mini);
        }

        /* TOP */

        .sidebar-top{

            display:flex;

            align-items:center;

            gap:12px;

            padding:18px 14px;

            border-bottom:
                1px solid var(--border);

        }

        .mini-btn{

            width:46px;
            height:46px;

            border:none;

            border-radius:16px;

            background:var(--surface2);

            display:grid;

            place-items:center;

            cursor:pointer;

            color:var(--muted);

            transition:.3s;

            flex-shrink:0;

        }

        .mini-btn:hover{

            background:var(--grad);

            color:white;

            transform:rotate(180deg);

        }

        .mini-btn svg{
            width:20px;
            height:20px;
        }

        /* LOGO */

        .logo{

            display:flex;

            align-items:center;

            gap:12px;

            overflow:hidden;

            white-space:nowrap;

            transition:.3s;

        }

        body.mini .logo{

            opacity:0;

            width:0;

        }

        .logo-icon{

            width:42px;
            height:42px;

            border-radius:14px;

            background:var(--grad);

            display:grid;

            place-items:center;

            color:white;

            font-size:14px;

            font-weight:800;

            flex-shrink:0;

        }

        .logo-name{

            font-size:22px;

            font-weight:800;

            background:var(--grad);

            -webkit-background-clip:text;

            -webkit-text-fill-color:transparent;

        }

        .logo-tag{

            font-size:11px;

            color:var(--muted);

        }

        /* NAVIGATION */

        .nav{

            flex:1;

            overflow-y:auto;

            padding:14px 10px;

        }

        .nav::-webkit-scrollbar{
            display:none;
        }

        .nav-label{

            font-size:11px;

            font-weight:700;

            color:var(--muted);

            text-transform:uppercase;

            letter-spacing:1.5px;

            padding:14px 10px 8px;

        }

        body.mini .nav-label{
            display:none;
        }

        .nav a{

            position:relative;

            display:flex;

            align-items:center;

            gap:14px;

            padding:12px;

            border-radius:18px;

            margin-bottom:8px;

            overflow:hidden;

            color:var(--muted);

            font-size:15px;

            font-weight:700;

            transition:.3s;

        }

        .nav a:hover{

            transform:translateX(7px);

            background:
                linear-gradient(
                    135deg,
                    rgba(108,62,255,.18),
                    rgba(224,64,251,.13)
                );

            color:white;

            box-shadow:
                0 12px 30px
                rgba(108,62,255,.25);

        }

        .nav a.active{

            background:var(--grad);

            color:white;

            box-shadow:
                0 12px 32px
                rgba(108,62,255,.35);

        }

        .nav-ic{

            width:42px;
            height:42px;

            border-radius:14px;

            background:
                rgba(255,255,255,.08);

            display:grid;

            place-items:center;

            font-size:18px;

            flex-shrink:0;

            transition:.3s;

        }

        .nav a:hover .nav-ic{

            background:
                rgba(255,255,255,.18);

            transform:scale(1.08);

        }

        .nav a.active .nav-ic{

            background:
                rgba(255,255,255,.2);

        }

        body.mini .nav-txt{
            display:none;
        }

        /* TOOLTIP */

        body.mini .nav a:hover::after{

            content:attr(data-label);

            position:absolute;

            left:92px;
            top:50%;

            transform:translateY(-50%);

            background:var(--grad);

            color:white;

            padding:8px 14px;

            border-radius:12px;

            font-size:12px;

            white-space:nowrap;

            z-index:999;

        }

        /* BOTTOM */

        .sidebar-bottom{

            border-top:
                1px solid var(--border);

            padding:14px 10px;

        }

        .theme-btn{

            width:100%;

            border:none;

            background:none;

            display:flex;

            align-items:center;

            gap:12px;

            padding:10px;

            border-radius:16px;

            cursor:pointer;

            color:var(--muted);

            font-size:15px;

            font-weight:700;

            transition:.3s;

            margin-bottom:10px;

        }

        .theme-btn:hover{

            background:var(--surface2);

            color:var(--text);

        }

        /* LOGOUT */

        .logout-btn{

            width:100%;

            border:none;

            display:flex;

            align-items:center;

            gap:12px;

            padding:10px;

            border-radius:16px;

            cursor:pointer;

            font-size:15px;

            font-weight:700;

            transition:.35s;

            background:transparent;

            color:var(--muted);

            position:relative;

            overflow:hidden;

        }

        .logout-btn::before{

            content:"";

            position:absolute;

            top:0;
            left:-100%;

            width:100%;
            height:100%;

            background:
                linear-gradient(
                    90deg,
                    transparent,
                    rgba(255,255,255,.22),
                    transparent
                );

            transition:.7s;

        }

        .logout-btn:hover{

            background:
                linear-gradient(
                    135deg,
                    #ef4444,
                    #dc2626
                );

            color:white;

            transform:translateX(6px);

            box-shadow:
                0 12px 28px
                rgba(239,68,68,.35);

        }

        .logout-btn:hover::before{
            left:100%;
        }

        .theme-icon,
        .logout-icon{

            width:42px;
            height:42px;

            border-radius:14px;

            background:
                rgba(255,255,255,.08);

            display:grid;

            place-items:center;

            flex-shrink:0;

            transition:.35s;

        }

        .logout-btn:hover .logout-icon{

            background:
                rgba(255,255,255,.18);

            transform:scale(1.08);

        }

        body.mini .theme-text,
        body.mini .logout-text{
            display:none;
        }

        /* MAIN */

        .main{

            margin-left:var(--sidebar);

            min-height:100vh;

            transition:.35s;

        }

        body.mini .main{
            margin-left:var(--mini);
        }

        /* TOPBAR */

        .topbar{

            position:sticky;

            top:0;

            z-index:100;

            height:76px;

            display:flex;

            align-items:center;

            justify-content:space-between;

            padding:0 28px;

            background:
                rgba(255,255,255,.72);

            backdrop-filter:blur(14px);

            border-bottom:
                1px solid var(--border);

        }

        body.dark .topbar{

            background:
                rgba(15,23,42,.72);

        }

        .page-title{

            font-size:30px;

            font-weight:800;

        }

        .page-sub{

            font-size:13px;

            color:var(--muted);

            margin-top:3px;

        }

        .topbar-right{

            display:flex;

            align-items:center;

            gap:10px;

        }

        .top-btn{

            width:46px;
            height:46px;

            border-radius:16px;

            border:
                1px solid var(--border);

            background:var(--surface2);

            display:grid;

            place-items:center;

            cursor:pointer;

            transition:.3s;

        }

        .top-btn:hover{

            background:var(--grad);

            color:white;

            transform:translateY(-3px);

        }

        .user-box{

            display:flex;

            align-items:center;

            gap:10px;

            padding:5px 14px 5px 5px;

            border-radius:18px;

            background:var(--surface2);

            border:
                1px solid var(--border);

        }

        .avatar{

            width:38px;
            height:38px;

            border-radius:14px;

            background:var(--grad);

            display:grid;

            place-items:center;

            color:white;

            font-weight:800;

        }

        .username{

            font-size:14px;

            font-weight:700;

        }

        .page{
            padding:28px;
        }

        @media(max-width:768px){

            .sidebar{
                width:var(--mini);
            }

            .main{
                margin-left:var(--mini);
            }

            .logo,
            .nav-label,
            .nav-txt,
            .theme-text,
            .logout-text{
                display:none;
            }

            .page{
                padding:16px;
            }

            .topbar{
                padding:0 16px;
            }

            .username{
                display:none;
            }

        }

    </style>

</head>

<body>

    <aside class="sidebar">

        <div class="sidebar-top">

            <button
                class="mini-btn"
                onclick="toggleSidebar()"
            >

                <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                >

                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="15" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>

                </svg>

            </button>

            <div class="logo">

                <div class="logo-icon">
                    AX
                </div>

                <div>

                    <div class="logo-name">
                        AttendX
                    </div>

                    <div class="logo-tag">
                        Student Portal
                    </div>

                </div>

            </div>

        </div>

        <!-- NAV -->

        <nav class="nav">

            <div class="nav-label">
                Main
            </div>

            <a
                href="/dashboard/"
                class="{% if request.path == '/dashboard/' %}active{% endif %}"
                data-label="Dashboard"
            >
                <div class="nav-ic">🏠</div>
                <span class="nav-txt">Dashboard</span>
            </a>

            <a
                href="/timetable/"
                class="{% if request.path == '/timetable/' %}active{% endif %}"
                data-label="Timetable"
            >
                <div class="nav-ic">📚</div>
                <span class="nav-txt">Timetable</span>
            </a>

            <a
                href="/attendance/"
                class="{% if request.path == '/attendance/' %}active{% endif %}"
                data-label="Attendance"
            >
                <div class="nav-ic">📅</div>
                <span class="nav-txt">Attendance</span>
            </a>

            <a
                href="/student-reports/"
                class="{% if request.path == '/student-reports/' %}active{% endif %}"
                data-label="Reports"
            >
                <div class="nav-ic">📊</div>
                <span class="nav-txt">Reports</span>
            </a>

            <div class="nav-label">
                Account
            </div>

            <a
                href="/profile/"
                class="{% if request.path == '/profile/' %}active{% endif %}"
                data-label="Profile"
            >
                <div class="nav-ic">👤</div>
                <span class="nav-txt">Profile</span>
            </a>

            <a
                href="/settings/"
                class="{% if request.path == '/settings/' %}active{% endif %}"
                data-label="Settings"
            >
                <div class="nav-ic">⚙️</div>
                <span class="nav-txt">Settings</span>
            </a>

        </nav>

        <!-- BOTTOM -->

        <div class="sidebar-bottom">

            <button
                class="theme-btn"
                onclick="toggleTheme()"
            >

                <div
                    class="theme-icon"
                    id="themeIcon"
                >
                    🌙
                </div>

                <span
                    class="theme-text"
                    id="themeText"
                >
                    Dark Mode
                </span>

            </button>

            <form
                method="POST"
                action="{% url 'logout' %}"
            >

                {% csrf_token %}

                <button
                    type="submit"
                    class="logout-btn"
                >

                    <div class="logout-icon">
                        🚪
                    </div>

                    <span class="logout-text">
                        Logout
                    </span>

                </button>

            </form>

        </div>

    </aside>

    <!-- MAIN -->

    <div class="main">

        <header class="topbar">

            <div>

                <div class="page-title">

                    {% block page_title %}
                        Dashboard
                    {% endblock %}

                </div>

                <div class="page-sub">

                    AttendX ›

                    {% block page_subtitle %}
                        Student Panel
                    {% endblock %}

                </div>

            </div>

            <div class="topbar-right">

                <div class="user-box">

                    <div class="avatar">
                        S
                    </div>

                    <div class="username">
                        Student
                    </div>

                </div>

            </div>

        </header>

        <div class="page">

            {% block content %}
            {% endblock %}

        </div>

    </div>

    <script>

        const sidebar =
            document.querySelector('.sidebar');

        const main =
            document.querySelector('.main');

        function toggleSidebar(){

            document.body.classList.toggle(
                'mini'
            );

        }

        main.addEventListener(
            'mouseenter',
            () => {

                if(window.innerWidth > 1100){

                    document.body.classList.add(
                        'mini'
                    );

                }

            }
        );

        sidebar.addEventListener(
            'mouseenter',
            () => {

                if(window.innerWidth > 1100){

                    document.body.classList.remove(
                        'mini'
                    );

                }

            }
        );

        function mobileSidebar(){

            if(window.innerWidth < 1100){

                document.body.classList.add(
                    'mini'
                );

            }

        }

        mobileSidebar();

        window.addEventListener(
            'resize',
            mobileSidebar
        );

        function toggleTheme(){

            const dark =
                document.body.classList.toggle(
                    'dark'
                );

            localStorage.setItem(
                'theme',
                dark ? 'dark' : 'light'
            );

            updateTheme();

        }

        function updateTheme(){

            const dark =
                document.body.classList.contains(
                    'dark'
                );

            document.getElementById(
                'themeIcon'
            ).innerHTML =
                dark ? '☀️' : '🌙';

            document.getElementById(
                'themeText'
            ).innerHTML =
                dark
                    ? 'Light Mode'
                    : 'Dark Mode';

        }

        if(
            localStorage.getItem('theme')
            === 'dark'
        ){

            document.body.classList.add(
                'dark'
            );

        }

        updateTheme();

    </script>

</body>
</html>
