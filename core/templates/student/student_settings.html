{% extends "student/base.html" %}

{% block content %}

<div class="settings-page">

    <div class="settings-card">

        <div class="settings-header">

            <div>
                <p class="small-title">
                    ACCOUNT CONTROL
                </p>

                <h2>
                    Settings
                </h2>

                <span>
                    Manage password and appearance
                </span>
            </div>

            <div class="settings-icon">
                ⚙️
            </div>

        </div>

        <div class="actions">

            <!-- PASSWORD BUTTON -->

            <button
                class="action-btn blue"
                onclick="togglePasswordForm()"
                type="button"
            >

                <span>🔐</span>

                Change Password

            </button>

            <!-- THEME BUTTON -->

            <button
                class="action-btn dark-btn"
                onclick="window.toggleTheme()"
                type="button"
            >

                <span id="settingsThemeIcon">
                    🌙
                </span>

                <span id="settingsThemeText">
                    Dark Mode
                </span>

            </button>

        </div>

        <!-- PASSWORD FORM -->

        <div
            id="passwordForm"
            class="password-box"
        >

            <form
                method="POST"
                action="/settings/password/"
            >

                {% csrf_token %}

                <div class="form-grid">

                    <div class="form-group">

                        <label>
                            Old Password
                        </label>

                        {{ form.old_password }}

                    </div>

                    <div class="form-group">

                        <label>
                            New Password
                        </label>

                        {{ form.new_password1 }}

                    </div>

                    <div class="form-group">

                        <label>
                            Confirm Password
                        </label>

                        {{ form.new_password2 }}

                    </div>

                </div>

                <button
                    class="submit-btn"
                    type="submit"
                >

                    Update Password

                </button>

            </form>

        </div>

    </div>

</div>

<style>

.settings-page{

    min-height:70vh;

    display:flex;

    justify-content:center;

    padding:20px;

    animation:fadeIn .6s ease;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.settings-card{

    width:100%;

    max-width:920px;

    position:relative;

    overflow:hidden;

    background:
        radial-gradient(
            circle at top right,
            rgba(37,99,235,.18),
            transparent 35%
        ),

        linear-gradient(
            135deg,
            var(--surface),
            var(--card)
        );

    border:
        1px solid var(--border);

    border-radius:34px;

    padding:34px;

    box-shadow:
        0 24px 60px
        rgba(15,23,42,.12);
}

.settings-card::before{

    content:"";

    position:absolute;

    width:260px;
    height:260px;

    border-radius:50%;

    background:
        rgba(37,99,235,.18);

    filter:blur(40px);

    bottom:-120px;
    right:-80px;

    animation:
        floatGlow
        5s
        infinite
        alternate
        ease-in-out;
}

@keyframes floatGlow{

    from{
        transform:
            translateY(0)
            scale(1);
    }

    to{
        transform:
            translateY(-30px)
            scale(1.15);
    }
}

.settings-header{

    position:relative;

    z-index:2;

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:28px;
}

.small-title{

    color:#2563eb;

    font-size:12px;

    font-weight:950;

    letter-spacing:1px;
}

.settings-header h2{

    color:var(--text);

    font-size:52px;

    font-weight:900;

    margin:6px 0;
}

.settings-header span{

    color:var(--muted);

    font-weight:700;
}

.settings-icon{

    width:100px;
    height:100px;

    border-radius:28px;

    display:grid;

    place-items:center;

    font-size:44px;

    background:var(--surface2);

    animation:
        spin
        8s
        linear
        infinite;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

.actions{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;
}

.action-btn{

    border:none;

    border-radius:24px;

    padding:28px;

    color:white;

    font-size:18px;

    font-weight:900;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:12px;

    transition:.3s;
}

.action-btn:hover{

    transform:
        translateY(-5px)
        scale(1.02);

    box-shadow:
        0 18px 35px
        rgba(15,23,42,.18);
}

.action-btn span{

    font-size:26px;
}

.blue{

    background:
        linear-gradient(
            135deg,
            #2563eb,
            #06b6d4
        );
}

.dark-btn{

    background:
        linear-gradient(
            135deg,
            #111827,
            #334155
        );
}

.password-box{

    max-height:0;

    opacity:0;

    overflow:hidden;

    margin-top:0;

    transition:
        max-height .5s ease,
        opacity .4s ease,
        margin-top .4s ease;
}

.password-box.show{

    max-height:700px;

    opacity:1;

    margin-top:28px;
}

.password-box form{

    background:var(--surface);

    border:
        1px solid var(--border);

    border-radius:28px;

    padding:24px;
}

.form-grid{

    display:grid;

    gap:18px;
}

.form-group{

    display:flex;

    flex-direction:column;
}

.form-group label{

    color:var(--text);

    font-size:14px;

    font-weight:900;

    margin-bottom:8px;
}

.form-group input{

    width:100%;

    padding:15px;

    border-radius:16px;

    border:
        1px solid var(--border);

    background:var(--surface2);

    color:var(--text);

    outline:none;

    font-size:15px;

    transition:.25s;
}

.form-group input:focus{

    border-color:#2563eb;

    box-shadow:
        0 0 0 4px
        rgba(37,99,235,.12);
}

.submit-btn{

    width:100%;

    margin-top:22px;

    border:none;

    border-radius:18px;

    padding:16px;

    background:
        linear-gradient(
            135deg,
            #22c55e,
            #16a34a
        );

    color:white;

    font-size:16px;

    font-weight:900;

    cursor:pointer;

    transition:.3s;
}

.submit-btn:hover{

    transform:
        translateY(-4px);

    box-shadow:
        0 16px 32px
        rgba(34,197,94,.22);
}

@media(max-width:700px){

    .actions{
        grid-template-columns:1fr;
    }

    .settings-header{
        flex-direction:column;
        align-items:flex-start;
        gap:18px;
    }

    .settings-header h2{
        font-size:38px;
    }

    .settings-icon{
        display:none;
    }
}

</style>

<script>

function togglePasswordForm(){

    document
        .getElementById("passwordForm")
        .classList
        .toggle("show");
}

function syncSettingsThemeText(){

    const icon =
        document.getElementById(
            "settingsThemeIcon"
        );

    const text =
        document.getElementById(
            "settingsThemeText"
        );

    if(!icon || !text){
        return;
    }

    if(
        document.body.classList.contains(
            "dark"
        )
    ){

        icon.innerHTML = "🌙";

        text.innerHTML = "Dark Mode";

    }else{

        icon.innerHTML = "☀️";

        text.innerHTML = "Light Mode";
    }
}

setInterval(
    syncSettingsThemeText,
    200
);

syncSettingsThemeText();

</script>

{% endblock %}
